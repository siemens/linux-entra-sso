name: release browser extension

on:
  push:
    tags:
      - 'v*.*'
      - 'v*.*.*'

permissions: {}

env:
  WEB_EXT_VERS: 10.1.0
  CRX3_VERS: 2.0.0

jobs:
  release-extension:
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      attestations: write
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: get git committer
        run: |
          echo "GIT_COMMITTER=$(git show -s --format='%cn <%ce>')" >> $GITHUB_ENV

      - name: install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y make git zip

      - name: build packages
        run: RELEASE_TAG=${{ github.ref_name }} make package deb

      - name: sign Firefox extension by Mozilla
        run: |
          npx web-ext@${{ env.WEB_EXT_VERS }} sign \
            --channel unlisted \
            --approval-timeout 900000 \
            --api-key ${{ secrets.AMO_API_KEY }} \
            --api-secret ${{ secrets.AMO_API_SECRET }} \
            --source-dir build/firefox \
            --artifacts-dir build

      # self distributed extensions on Thunderbird are not signed
      - name: build Thunderbird extension
        run: |
          npx web-ext@${{ env.WEB_EXT_VERS }} build \
            --source-dir build/thunderbird \
            --artifacts-dir build \
            --filename '{name}-{version}.thunderbird.xpi'

      # sign the Chrome extension with our own private key, as the
      # Chrome Web Store upload requires a packed and signed CRX file
      - name: pack signed Chrome extension
        env:
          CRX_PRIVATE_KEY: ${{ secrets.CRX_PRIVATE_KEY }}
        run: |
          KEY_FILE="$(mktemp)"
          trap 'shred -u "$KEY_FILE"' EXIT
          printf '%s' "$CRX_PRIVATE_KEY" > "$KEY_FILE"
          cat "build/Linux-Entra-SSO-${{ github.ref_name }}.chrome.zip" | npx crx3@${{ env.CRX3_VERS }} \
            --key "$KEY_FILE" \
            --crx "build/Linux-Entra-SSO-${{ github.ref_name }}.chrome.crx"

      - name: upload firefox extension
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: firefox-signed-xpi
          path: |
            build/linux_entra_sso-*.xpi

      - name: upload debian package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: debian-package
          path: |
            pkgs/linux-entra-sso_*.deb

      - name: attest Firefox extension build
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: |
            build/linux_entra_sso-*.xpi
            pkgs/linux-entra-sso_*.deb

      - name: create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            build/linux_entra_sso-*.xpi
            pkgs/linux-entra-sso_*.deb
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            Release of version ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: true

      - name: create update manifest for Firefox
        run: |
          VERSION=$(echo ${{ github.ref_name }} | cut -c 2-)
          DIGEST="sha256:$(sha256sum build/linux_entra_sso-${VERSION}.xpi | cut -d ' ' -f 1)"
          LINK="https://github.com/siemens/linux-entra-sso/releases/download/v${VERSION}/linux_entra_sso-${VERSION}.xpi"
          jq --arg version "${VERSION}" --arg digest "${DIGEST}" --arg link "${LINK}" \
            '."addons"."linux-entra-sso@example.com"."updates" += [{"version":$version, "update_link":$link, "update_hash":$digest}]' \
            .pages/firefox/updates.json \
            > .pages/firefox/updates.json.tmp && mv .pages/firefox/updates.json.tmp .pages/firefox/updates.json

      - name: create update manifest for Thunderbird
        run: |
          VERSION=$(echo ${{ github.ref_name }} | cut -c 2-)
          DIGEST="sha256:$(sha256sum build/linux_entra_sso-${VERSION}.thunderbird.xpi | cut -d ' ' -f 1)"
          LINK="https://github.com/siemens/linux-entra-sso/releases/download/v${VERSION}/linux_entra_sso-${VERSION}.thunderbird.xpi"
          jq --arg version "${VERSION}" --arg digest "${DIGEST}" --arg link "${LINK}" \
            '."addons"."@linux-entra-sso.tb"."updates" += [{"version":$version, "update_link":$link, "update_hash":$digest}]' \
            .pages/thunderbird/updates.json \
            > .pages/thunderbird/updates.json.tmp && mv .pages/thunderbird/updates.json.tmp .pages/thunderbird/updates.json

      - name: prepare PR for Mozilla update manifests
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          add-paths: |
            .pages/firefox/updates.json
            .pages/thunderbird/updates.json
          commit-message: "chore: release Mozilla update manifests"
          branch: ci/release-firefox-update-manifest
          base: main
          title: "chore: release Mozilla update manifests [bot]"
          assignees: fmoessbauer
          reviewers: jan-kiszka
          author: ${{ env.GIT_COMMITTER }}
          committer: ${{ env.GIT_COMMITTER }}
          signoff: true
          body: |
            Publish update manifest for Mozilla extensions, version ${{ github.ref_name }}.

      - name: release Chrome extension on CWS
        uses: mnao305/chrome-extension-upload@fdfe79400af990f5145a319e834aee64907ccff4 # v6.0.0
        with:
          file-path: build/Linux-Entra-SSO-${{ github.ref_name }}.chrome.crx
          extension-id: jlnfnnolkbjieggibinobhkjdfbpcohn
          client-id: ${{ secrets.CWS_CLIENT_ID }}
          client-secret: ${{ secrets.CWS_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CWS_REFRESH_TOKEN }}
          publish: false
